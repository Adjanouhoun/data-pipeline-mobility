x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.11
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres_metadata/airflow
    - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres_metadata/airflow
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__CORE__LOGGING_LEVEL=INFO
    # Connexion automatique vers notre entrepôt Postgres local
    - AIRFLOW_CONN_POSTGRES_DEST_CONN=postgresql://data_engineer:password123@postgres_destination:5432/mobility_warehouse
  volumes:
    - ./dags:/opt/airflow/dags
    - ./plugins:/opt/airflow/plugins
    - ./configlogs:/opt/airflow/logs
    - ./dbt_mobility:/opt/airflow/dbt_mobility
  user: "0:0"
  depends_on:
    postgres_metadata:
      condition: service_healthy

services:
  # Base de données pour les métadonnées internes d'Airflow
  postgres_metadata:
    image: postgres:15-alpine
    container_name: postgres_metadata
    environment:
      - POSTGRES_DB=airflow
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
    volumes:
      - postgres_metadata_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Entrepôt de données de destination (Data Warehouse local)
  postgres_destination:
    image: postgres:15-alpine
    container_name: postgres_destination
    environment:
      - POSTGRES_DB=mobility_warehouse
      - POSTGRES_USER=data_engineer
      - POSTGRES_PASSWORD=password123
    ports:
      - "5435:5432"
    volumes:
      - postgres_destination_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U data_engineer -d mobility_warehouse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Webserver Airflow (Interface graphique sur http://localhost:8085)
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8085:8080"
    restart: always

  # Scheduler Airflow (Le moteur qui déclenche les tâches)
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    restart: always

  # Initialisateur de la base Airflow au démarrage
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    command: version
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres_metadata/airflow
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres_metadata/airflow
      - _AIRFLOW_DB_UPGRADE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
      
  # --- CONFIGURATION SUPERSET (BI) ---

  # Base de données pour stocker les configurations de Superset
  postgres_superset:
    image: postgres:15-alpine
    container_name: postgres_superset
    environment:
      - POSTGRES_DB=superset
      - POSTGRES_USER=superset
      - POSTGRES_PASSWORD=superset_password
    volumes:
      - superset_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Service Apache Superset (Visualisation sur http://localhost:8088)
  superset:
    image: apache/superset:4.0.1
    container_name: superset_bi
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=votre_cle_secrete_super_securisee_123456
      - SQLALCHEMY_DATABASE_URI=postgresql://superset:superset_password@postgres_superset:5432/superset
      - MAPBOX_API_KEY=${MAPBOX_API_KEY}
      - SUPERSET_HOME_PATH=/dashboard/list/
    volumes:
      - superset_home:/app/superset_home
    depends_on:
      postgres_superset:
        condition: service_healthy
      postgres_destination:
        condition: service_healthy

  # Interface de gestion PostgreSQL (sur http://localhost:8051)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mobility_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8051:80"
    restart: always
    depends_on:
      - postgres_destination  # <-- Corrigé pour pointer vers ton entrepôt !

volumes:
  postgres_metadata_data:
  postgres_destination_data:
  superset_db_data:
  superset_home: