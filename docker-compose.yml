x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.11
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER:?AIRFLOW_DB_USER must be set}:${AIRFLOW_DB_PASSWORD:?AIRFLOW_DB_PASSWORD must be set}@postgres_metadata/${AIRFLOW_DB_NAME:?AIRFLOW_DB_NAME must be set}
    - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER:?AIRFLOW_DB_USER must be set}:${AIRFLOW_DB_PASSWORD:?AIRFLOW_DB_PASSWORD must be set}@postgres_metadata/${AIRFLOW_DB_NAME:?AIRFLOW_DB_NAME must be set}
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__CORE__LOGGING_LEVEL=INFO
    # Connexion automatique vers notre entrepôt Postgres local
    - AIRFLOW_CONN_POSTGRES_DEST_CONN=postgresql://${WAREHOUSE_DB_USER:?WAREHOUSE_DB_USER must be set}:${WAREHOUSE_DB_PASSWORD:?WAREHOUSE_DB_PASSWORD must be set}@postgres_destination:5432/${WAREHOUSE_DB_NAME:?WAREHOUSE_DB_NAME must be set}
    - WAREHOUSE_DB_NAME=${WAREHOUSE_DB_NAME:?WAREHOUSE_DB_NAME must be set}
    - WAREHOUSE_DB_USER=${WAREHOUSE_DB_USER:?WAREHOUSE_DB_USER must be set}
    - WAREHOUSE_DB_PASSWORD=${WAREHOUSE_DB_PASSWORD:?WAREHOUSE_DB_PASSWORD must be set}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./plugins:/opt/airflow/plugins
    - ./configlogs:/opt/airflow/logs
    - ./dbt_mobility:/opt/airflow/dbt_mobility
  user: "0:0"
  depends_on:
    postgres_metadata:
      condition: service_healthy

services:
  # Base de données pour les métadonnées internes d'Airflow
  postgres_metadata:
    image: postgres:15-alpine
    container_name: postgres_metadata
    environment:
      - POSTGRES_DB=${AIRFLOW_DB_NAME:?AIRFLOW_DB_NAME must be set}
      - POSTGRES_USER=${AIRFLOW_DB_USER:?AIRFLOW_DB_USER must be set}
      - POSTGRES_PASSWORD=${AIRFLOW_DB_PASSWORD:?AIRFLOW_DB_PASSWORD must be set}
    volumes:
      - postgres_metadata_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${AIRFLOW_DB_USER:?AIRFLOW_DB_USER must be set} -d ${AIRFLOW_DB_NAME:?AIRFLOW_DB_NAME must be set}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Entrepôt de données de destination (Data Warehouse local)
  postgres_destination:
    image: postgres:15-alpine
    container_name: postgres_destination
    environment:
      - POSTGRES_DB=${WAREHOUSE_DB_NAME:?WAREHOUSE_DB_NAME must be set}
      - POSTGRES_USER=${WAREHOUSE_DB_USER:?WAREHOUSE_DB_USER must be set}
      - POSTGRES_PASSWORD=${WAREHOUSE_DB_PASSWORD:?WAREHOUSE_DB_PASSWORD must be set}
    ports:
      - "5435:5432"
    volumes:
      - postgres_destination_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${WAREHOUSE_DB_USER:?WAREHOUSE_DB_USER must be set} -d ${WAREHOUSE_DB_NAME:?WAREHOUSE_DB_NAME must be set}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Webserver Airflow (Interface graphique sur http://localhost:8085)
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8085:8080"
    restart: always

  # Scheduler Airflow (Le moteur qui déclenche les tâches)
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    restart: always

  # Initialisateur de la base Airflow au démarrage
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    command: version
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER:?AIRFLOW_DB_USER must be set}:${AIRFLOW_DB_PASSWORD:?AIRFLOW_DB_PASSWORD must be set}@postgres_metadata/${AIRFLOW_DB_NAME:?AIRFLOW_DB_NAME must be set}
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER:?AIRFLOW_DB_USER must be set}:${AIRFLOW_DB_PASSWORD:?AIRFLOW_DB_PASSWORD must be set}@postgres_metadata/${AIRFLOW_DB_NAME:?AIRFLOW_DB_NAME must be set}
      - _AIRFLOW_DB_UPGRADE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=${AIRFLOW_ADMIN_USERNAME:?AIRFLOW_ADMIN_USERNAME must be set}
      - _AIRFLOW_WWW_USER_PASSWORD=${AIRFLOW_ADMIN_PASSWORD:?AIRFLOW_ADMIN_PASSWORD must be set}

  # --- CONFIGURATION SUPERSET (BI) ---

  # Base de données pour stocker les configurations de Superset
  postgres_superset:
    image: postgres:15-alpine
    container_name: postgres_superset
    environment:
      - POSTGRES_DB=${SUPERSET_DB_NAME:?SUPERSET_DB_NAME must be set}
      - POSTGRES_USER=${SUPERSET_DB_USER:?SUPERSET_DB_USER must be set}
      - POSTGRES_PASSWORD=${SUPERSET_DB_PASSWORD:?SUPERSET_DB_PASSWORD must be set}
    volumes:
      - superset_db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${SUPERSET_DB_USER:?SUPERSET_DB_USER must be set} -d ${SUPERSET_DB_NAME:?SUPERSET_DB_NAME must be set}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Service Apache Superset (Visualisation sur http://localhost:8088)
  superset:
    image: apache/superset:4.0.1
    container_name: superset_bi
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY:?SUPERSET_SECRET_KEY must be set}
      - SQLALCHEMY_DATABASE_URI=postgresql://${SUPERSET_DB_USER:?SUPERSET_DB_USER must be set}:${SUPERSET_DB_PASSWORD:?SUPERSET_DB_PASSWORD must be set}@postgres_superset:5432/${SUPERSET_DB_NAME:?SUPERSET_DB_NAME must be set}
      - MAPBOX_API_KEY=${MAPBOX_API_KEY:-}
      - SUPERSET_HOME_PATH=/dashboard/list/
    volumes:
      - superset_home:/app/superset_home
    depends_on:
      postgres_superset:
        condition: service_healthy
      postgres_destination:
        condition: service_healthy

  # Interface de gestion PostgreSQL (sur http://localhost:8051)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mobility_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:?PGADMIN_DEFAULT_EMAIL must be set}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD must be set}
    ports:
      - "8051:80"
    restart: always
    depends_on:
      - postgres_destination

volumes:
  postgres_metadata_data:
  postgres_destination_data:
  superset_db_data:
  superset_home: