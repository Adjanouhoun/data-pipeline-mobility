name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Python, shell and Compose validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            --requirement requirements-dev.txt

      - name: Run Python unit tests
        env:
          PYTHONPYCACHEPREFIX: /tmp/mobility-pycache
        run: |
          python -m unittest discover \
            -s tests/unit \
            -p "test_*.py" \
            -v

      - name: Compile ingestion libraries
        env:
          PYTHONPYCACHEPREFIX: /tmp/mobility-pycache
        run: |
          python -m py_compile dags/lib/*.py

      - name: Validate operational scripts
        run: |
          bash -n scripts/backup_warehouse.sh
          bash -n scripts/verify_warehouse_backup.sh
          bash -n scripts/apply_data_retention.sh

      - name: Prepare Compose environment
        run: |
          cp .env.example .env

      - name: Validate Docker Compose
        run: |
          docker compose config --quiet