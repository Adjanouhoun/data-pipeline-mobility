version: 2

models:
  - name: dim_stations
    description: >-
      Dimension courante des stations Vélib. Une ligne représente
      une station dans son état descriptif le plus récemment ingéré.

    columns:
      - name: station_id
        description: "Identifiant métier unique de la station."
        tests:
          - unique
          - not_null

      - name: station_name
        description: "Nom courant de la station."
        tests:
          - not_null

      - name: total_capacity
        description: "Capacité courante déclarée par l’API."
        tests:
          - not_null

      - name: longitude
        description: >-
          Longitude du point représentatif de l’arc lorsqu’elle
          est fournie par l’API.

      - name: latitude
        description: >-
          Latitude du point représentatif de l’arc lorsqu’elle
          est fournie par l’API.

      - name: first_seen_at
        description: "Première ingestion connue de la station."
        tests:
          - not_null

      - name: last_seen_at
        description: "Ingestion la plus récente de la station."
        tests:
          - not_null

  - name: fct_velib_status
    description: >-
      Table de faits historisée contenant une ligne par station
      et par horodatage métier Vélib.

    columns:
      - name: observation_id
        description: >-
          Clé déterministe construite à partir de station_id
          et status_updated_at.
        tests:
          - unique
          - not_null

      - name: station_id
        description: "Identifiant de la station Vélib."
        tests:
          - not_null
          - relationships:
              to: ref('dim_stations')
              field: station_id

      - name: station_name
        description: "Nom de la station au moment de l’observation."
        tests:
          - not_null

      - name: total_capacity
        description: "Capacité déclarée au moment de l’observation."
        tests:
          - not_null

      - name: status_updated_at
        description: "Horodatage métier de l’observation."
        tests:
          - not_null

      - name: loaded_at
        description: "Horodatage technique d’ingestion."
        tests:
          - not_null

      - name: station_status
        description: "Statut analytique de la station."
        tests:
          - not_null
          - accepted_values:
              values:
                - "Normal"
                - "Presque pleine"
                - "Presque vide"
                - "Vide"
                - "Hors service"
                - "Non installée"

  - name: agg_velib_station_daily
    description: >-
      Agrégats quotidiens de disponibilité Vélib. Une ligne représente
      une station et une journée d’observation.

    columns:
      - name: daily_station_id
        description: >-
          Clé déterministe construite à partir de station_id
          et observation_date.
        tests:
          - unique
          - not_null

      - name: station_id
        description: "Identifiant de la station Vélib."
        tests:
          - not_null
          - relationships:
              to: ref('dim_stations')
              field: station_id

      - name: observation_date
        description: "Date métier des observations agrégées."
        tests:
          - not_null

      - name: observation_count
        description: >-
          Nombre d’observations agrégées pour la station
          et la journée.
        tests:
          - not_null

      - name: average_bikes_available
        description: "Nombre moyen de vélos disponibles."
        tests:
          - not_null

      - name: minimum_bikes_available
        description: "Nombre minimum de vélos disponibles."
        tests:
          - not_null

      - name: maximum_bikes_available
        description: "Nombre maximum de vélos disponibles."
        tests:
          - not_null

      - name: average_docks_available
        description: "Nombre moyen de bornes disponibles."
        tests:
          - not_null

      - name: average_occupancy_rate_percent
        description: >-
          Taux moyen d’occupation de la station en pourcentage.
        tests:
          - not_null

      - name: empty_observation_count
        description: >-
          Nombre d’observations pendant lesquelles la station
          était vide.
        tests:
          - not_null

      - name: no_dock_observation_count
        description: >-
          Nombre d’observations pendant lesquelles aucune borne
          n’était disponible.
        tests:
          - not_null

      - name: out_of_service_observation_count
        description: >-
          Nombre d’observations avec une station hors service.
        tests:
          - not_null

      - name: capacity_anomaly_count
        description: >-
          Nombre d’observations où les vélos disponibles dépassaient
          la capacité déclarée.
        tests:
          - not_null

      - name: first_observed_at
        description: "Première observation métier de la journée."
        tests:
          - not_null

      - name: last_observed_at
        description: "Dernière observation métier de la journée."
        tests:
          - not_null

      - name: last_loaded_at
        description: >-
          Dernier chargement technique inclus dans l’agrégat.
        tests:
          - not_null

  - name: dim_road_arcs
    description: >-
      Dimension courante des axes du réseau routier parisien.
      Une ligne représente un axe dans son état descriptif
      le plus récemment ingéré.

    columns:
      - name: arc_id
        description: "Identifiant métier unique de l’axe routier."
        tests:
          - unique
          - not_null

      - name: arc_label
        description: "Libellé courant de l’axe routier."

      - name: upstream_node_id
        description: "Identifiant du nœud situé en amont."

      - name: upstream_node_label
        description: "Libellé du nœud situé en amont."

      - name: downstream_node_id
        description: "Identifiant du nœud situé en aval."

      - name: downstream_node_label
        description: "Libellé du nœud situé en aval."

      - name: longitude
        description: >-
          Longitude du point représentatif de l’arc lorsqu’elle
          est fournie par l’API.

      - name: latitude
        description: >-
          Latitude du point représentatif de l’arc lorsqu’elle
          est fournie par l’API.

      - name: first_observed_at
        description: "Première observation métier connue de l’axe."
        tests:
          - not_null

      - name: last_observed_at
        description: "Observation métier la plus récente de l’axe."
        tests:
          - not_null

      - name: first_loaded_at
        description: "Première ingestion technique connue de l’axe."
        tests:
          - not_null

      - name: last_loaded_at
        description: "Ingestion technique la plus récente de l’axe."
        tests:
          - not_null

  - name: fct_road_traffic
    description: >-
      Table de faits historisée du trafic routier parisien.
      Une ligne représente une observation horaire pour un axe routier.

    columns:
      - name: observation_id
        description: >-
          Clé déterministe construite à partir de arc_id
          et observed_at.
        tests:
          - unique
          - not_null

      - name: arc_id
        description: "Identifiant métier de l’axe routier."
        tests:
          - not_null
          - relationships:
              to: ref('dim_road_arcs')
              field: arc_id

      - name: observed_at
        description: "Horodatage métier de la mesure de trafic."
        tests:
          - not_null

      - name: vehicle_flow
        description: >-
          Débit de véhicules mesuré pendant la période.
          La valeur peut être absente dans la source.

      - name: occupancy_rate
        description: >-
          Taux d’occupation mesuré sur l’axe.
          La valeur peut être absente dans la source.

      - name: traffic_status
        description: "État du trafic fourni par la source."
        tests:
          - accepted_values:
              values:
                - "Fluide"
                - "Pré-saturé"
                - "Saturé"
                - "Bloqué"
                - "Inconnu"

      - name: arc_status
        description: "État opérationnel de l’axe routier."
        tests:
          - accepted_values:
              values:
                - "Ouvert"
                - "Barré"
                - "Invalide"

      - name: has_vehicle_flow
        description: "Indique si une mesure de débit est disponible."
        tests:
          - not_null
          - accepted_values:
              values:
                - true
                - false

      - name: has_occupancy_rate
        description: >-
          Indique si une mesure de taux d’occupation est disponible.
        tests:
          - not_null
          - accepted_values:
              values:
                - true
                - false

      - name: has_traffic_measurement
        description: >-
          Indique si au moins une mesure de débit ou d’occupation
          est disponible.
        tests:
          - not_null
          - accepted_values:
              values:
                - true
                - false

      - name: loaded_at
        description: "Horodatage technique d’ingestion."
        tests:
          - not_null

      - name: source_run_id
        description: "Identifiant du run Airflow ayant chargé la donnée."
        tests:
          - not_null

  - name: agg_road_traffic_daily
    description: >-
      Agrégats journaliers du trafic routier parisien.
      Une ligne représente un axe routier et une journée.

    columns:
      - name: daily_traffic_id
        description: >-
          Clé déterministe construite à partir de arc_id
          et observation_date.
        tests:
          - unique
          - not_null

      - name: arc_id
        description: "Identifiant métier de l’axe routier."
        tests:
          - not_null
          - relationships:
              to: ref('dim_road_arcs')
              field: arc_id

      - name: observation_date
        description: "Date métier des observations agrégées."
        tests:
          - not_null

      - name: observation_count
        description: "Nombre total d’observations agrégées."
        tests:
          - not_null

      - name: vehicle_flow_observation_count
        description: >-
          Nombre d’observations disposant d’une mesure de débit.
        tests:
          - not_null

      - name: occupancy_observation_count
        description: >-
          Nombre d’observations disposant d’une mesure d’occupation.
        tests:
          - not_null

      - name: average_vehicle_flow
        description: >-
          Débit moyen calculé à partir des mesures disponibles.

      - name: maximum_vehicle_flow
        description: >-
          Débit maximal calculé à partir des mesures disponibles.

      - name: average_occupancy_rate
        description: >-
          Taux d’occupation moyen calculé à partir des mesures
          disponibles.

      - name: maximum_occupancy_rate
        description: >-
          Taux d’occupation maximal calculé à partir des mesures
          disponibles.

      - name: fluid_observation_count
        description: "Nombre d’observations avec un trafic fluide."
        tests:
          - not_null

      - name: pre_saturated_observation_count
        description: "Nombre d’observations avec un trafic pré-saturé."
        tests:
          - not_null

      - name: saturated_observation_count
        description: "Nombre d’observations avec un trafic saturé."
        tests:
          - not_null

      - name: blocked_observation_count
        description: "Nombre d’observations avec un trafic bloqué."
        tests:
          - not_null

      - name: unknown_observation_count
        description: >-
          Nombre d’observations dont l’état du trafic est inconnu
          ou absent.
        tests:
          - not_null

      - name: open_arc_observation_count
        description: "Nombre d’observations avec un axe ouvert."
        tests:
          - not_null

      - name: closed_arc_observation_count
        description: "Nombre d’observations avec un axe barré."
        tests:
          - not_null

      - name: invalid_arc_observation_count
        description: >-
          Nombre d’observations avec un axe invalide
          ou sans état renseigné.
        tests:
          - not_null

      - name: first_observed_at
        description: "Première observation métier de la journée."
        tests:
          - not_null

      - name: last_observed_at
        description: "Dernière observation métier de la journée."
        tests:
          - not_null

      - name: last_loaded_at
        description: >-
          Dernier chargement technique inclus dans l’agrégat.
        tests:
          - not_null

  - name: fct_velib_current_status
    description: >-
      Dernier état connu de chaque station Vélib, destiné aux KPI
      et à la carte du dashboard Superset Disponibilité Vélib.

    columns:
      - name: observation_id
        description: "Identifiant de la dernière observation retenue."
        tests:
          - unique
          - not_null

      - name: station_id
        description: "Identifiant métier unique de la station."
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('dim_stations')
              field: station_id

      - name: station_name
        description: "Nom courant de la station."
        tests:
          - not_null

      - name: bikes_available
        description: "Nombre de vélos actuellement disponibles."
        tests:
          - not_null

      - name: mechanical_bikes
        description: "Nombre de vélos mécaniques disponibles."
        tests:
          - not_null

      - name: electric_bikes
        description: "Nombre de vélos électriques disponibles."
        tests:
          - not_null

      - name: docks_available
        description: "Nombre de bornes disponibles."
        tests:
          - not_null

      - name: total_capacity
        description: "Capacité déclarée de la station."
        tests:
          - not_null

      - name: longitude
        description: >-
          Longitude du point représentatif de l’arc lorsqu’elle
          est fournie par l’API.

      - name: latitude
        description: >-
          Latitude du point représentatif de l’arc lorsqu’elle
          est fournie par l’API.

      - name: station_status
        description: "Dernier statut analytique de la station."
        tests:
          - not_null
          - accepted_values:
              values:
                - "Normal"
                - "Presque pleine"
                - "Presque vide"
                - "Vide"
                - "Hors service"
                - "Non installée"

      - name: status_updated_at
        description: "Horodatage métier de la dernière observation."
        tests:
          - not_null

      - name: loaded_at
        description: "Horodatage technique de son ingestion."
        tests:
          - not_null

      - name: data_age_minutes
        description: "Âge technique de la donnée en minutes."
        tests:
          - not_null

      - name: is_fresh
        description: >-
          Indique si l’observation a été chargée durant les
          deux dernières heures.
        tests:
          - not_null


  - name: fct_road_traffic_current_status
    description: >-
      Dernier état connu de chaque arc routier parisien,
      destiné aux KPI et à la carte du dashboard Superset.

    columns:
      - name: observation_id
        description: "Identifiant de la dernière observation retenue."
        tests:
          - unique
          - not_null

      - name: arc_id
        description: "Identifiant métier unique de l’arc routier."
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('dim_road_arcs')
              field: arc_id

      - name: arc_label
        description: "Libellé de l’arc routier."
        tests:
          - not_null

      - name: observed_at
        description: "Horodatage métier de la dernière observation."
        tests:
          - not_null

      - name: traffic_status
        description: "Dernier état connu du trafic."
        tests:
          - not_null
          - accepted_values:
              values:
                - "Fluide"
                - "Pré-saturé"
                - "Saturé"
                - "Bloqué"
                - "Inconnu"

      - name: arc_status
        description: "État opérationnel de l’arc routier."
        tests:
          - not_null
          - accepted_values:
              values:
                - "Ouvert"
                - "Barré"
                - "Invalide"

      - name: longitude
        description: >-
          Longitude du point représentatif de l’arc lorsqu’elle
          est fournie par l’API.

      - name: latitude
        description: >-
          Latitude du point représentatif de l’arc lorsqu’elle
          est fournie par l’API.

      - name: has_vehicle_flow
        description: "Indique si une mesure de débit est disponible."
        tests:
          - not_null

      - name: has_occupancy_rate
        description: "Indique si une mesure d’occupation est disponible."
        tests:
          - not_null

      - name: has_traffic_measurement
        description: "Indique si au moins une mesure est disponible."
        tests:
          - not_null

      - name: loaded_at
        description: "Horodatage technique du chargement."
        tests:
          - not_null

      - name: data_age_minutes
        description: "Âge technique de la donnée en minutes."
        tests:
          - not_null

      - name: is_fresh
        description: >-
          Indique si l’observation a été chargée durant les
          deux dernières heures.
        tests:
          - not_null